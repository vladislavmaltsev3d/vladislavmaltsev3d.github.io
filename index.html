```html
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Test Apple Style</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #f5f5f7 0%, #e9e9ef 100%);
      color: #111;
    }

    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 60px 20px;
      text-align: center;
    }

    .card {
      background: rgba(255,255,255,0.7);
      border-radius: 32px;
      padding: 50px 30px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.12);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      animation: fadeUp 1s ease;
    }

    h1 {
      margin: 0 0 16px 0;
      font-size: 64px;
      letter-spacing: -2px;
    }

    p {
      margin: 0 auto;
      max-width: 700px;
      font-size: 20px;
      line-height: 1.6;
      color: #666;
    }

    .glow {
      width: 180px;
      height: 60px;
      margin: 40px auto 0;
      border-radius: 999px;
      background: rgba(255,255,255,0.95);
      filter: blur(18px);
      animation: float 4s ease-in-out infinite;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes float {
      0%, 100% {
        transform: translateY(0px) scale(1);
      }
      50% {
        transform: translateY(-10px) scale(1.05);
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Light Master Pro</h1>
      <p>
        Apple-style GitHub Pages test with shadows, soft glass effect, and simple animation.
      </p>
      <div class="glow"></div>
    </div>
  </div>
</body>
</html>
