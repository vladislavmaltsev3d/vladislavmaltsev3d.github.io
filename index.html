<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Light Master Pro - Test Button</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #f5f5f7 0%, #e9e9ef 100%);
      color: #111111;
      min-height: 100vh;
    }

    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 60px 20px;
      text-align: center;
    }

    .card {
      background: rgba(255, 255, 255, 0.72);
      border-radius: 32px;
      padding: 56px 32px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.12);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      animation: fadeUp 1s ease;
    }

    h1 {
      margin: 0 0 16px 0;
      font-size: 64px;
      letter-spacing: -2px;
    }

    p {
      margin: 0 auto 28px;
      max-width: 720px;
      font-size: 20px;
      line-height: 1.6;
      color: #666666;
    }

    .test-button {
      display: inline-block;
      padding: 16px 30px;
      border-radius: 999px;
      background: #111111;
      color: #ffffff;
      text-decoration: none;
      font-size: 17px;
      font-weight: 600;
      box-shadow: 0 12px 26px rgba(0, 0, 0, 0.16);
      transition: transform 0.22s ease, box-shadow 0.22s ease;
    }

    .test-button:hover {
      transform: scale(1.08);
      box-shadow: 0 18px 34px rgba(0, 0, 0, 0.22);
    }

    .glow {
      width: 180px;
      height: 60px;
      margin: 40px auto 0;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.95);
      filter: blur(18px);
      animation: float 4s ease-in-out infinite;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes float {
      0%, 100% {
        transform: translateY(0px) scale(1);
      }
      50% {
        transform: translateY(-10px) scale(1.05);
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Light Master Pro</h1>
      <p>
        Test GitHub Pages layout with a hover button that smoothly scales up when the cursor is over it.
      </p>

      <a href="#" class="test-button">Test Button</a>

      <div class="glow"></div>
    </div>
  </div>
</body>
</html>
